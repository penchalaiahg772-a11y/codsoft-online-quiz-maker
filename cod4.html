<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Quiz Maker</title>
</head>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6ff;
padding:20px;
}

header{
text-align:center;
margin-bottom:20px;
}

h1{
color:red;
margin-bottom:15px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,
select,
button{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

.question{
margin-bottom:15px;
padding:10px;
background:#eef2ff;
border-radius:8px;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}

</style>
<body>

<header>
<h1>Online Quiz Maker</h1>

<div id="authSection">
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<p id="welcome"></p>
</header>

<div class="container">

<section class="card">
<h2>Create Quiz</h2>

<input type="text" id="question" placeholder="Question">

<input type="text" id="option1" placeholder="Option 1">
<input type="text" id="option2" placeholder="Option 2">
<input type="text" id="option3" placeholder="Option 3">
<input type="text" id="option4" placeholder="Option 4">

<select id="correct">
<option value="0">Correct Answer - Option 1</option>
<option value="1">Correct Answer - Option 2</option>
<option value="2">Correct Answer - Option 3</option>
<option value="3">Correct Answer - Option 4</option>
</select>

<button onclick="addQuestion()">Add Question</button>
</section>

<section class="card">
<h2>Available Quizzes</h2>
<div id="quizList"></div>
</section>

<section class="card" id="quizArea">
<h2>Quiz</h2>
<div id="quizContainer"></div>
</section>

<section class="card">
<h2>Results</h2>
<div id="result"></div>
</section>

</div>

<script>
    let users = JSON.parse(localStorage.getItem("users")) || [];
let quizzes = JSON.parse(localStorage.getItem("quizzes")) || [];

let currentUser = "";

function saveData() {
localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("quizzes", JSON.stringify(quizzes));
}

function register() {

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username === "" || password === "") {
alert("Fill all fields");
return;
}

users.push({username,password});

saveData();

alert("Registration Successful");
}

function login() {

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let user = users.find(
u => u.username === username &&
u.password === password
);

if(user){

currentUser = username;

document.getElementById("welcome").innerHTML =
"Welcome " + username;

alert("Login Successful");

}else{
alert("Invalid Login");
}
}

function addQuestion(){

if(currentUser === ""){
alert("Please Login First");
return;
}

let question =
document.getElementById("question").value;

let options = [
document.getElementById("option1").value,
document.getElementById("option2").value,
document.getElementById("option3").value,
document.getElementById("option4").value
];

let correct =
parseInt(document.getElementById("correct").value);

quizzes.push({
question,
options,
correct
});

saveData();

loadQuizzes();

alert("Question Added");

document.getElementById("question").value="";
document.getElementById("option1").value="";
document.getElementById("option2").value="";
document.getElementById("option3").value="";
document.getElementById("option4").value="";
}

function loadQuizzes(){

let list =
document.getElementById("quizList");

list.innerHTML = "";

if(quizzes.length > 0){

let btn =
document.createElement("button");

btn.innerHTML =
"Start Quiz ("+quizzes.length+" Questions)";

btn.onclick = startQuiz;

list.appendChild(btn);

}else{

list.innerHTML =
"No Quiz Available";

}
}

function startQuiz(){

let container =
document.getElementById("quizContainer");

container.innerHTML = "";

quizzes.forEach((quiz,index)=>{

let div =
document.createElement("div");

div.className="question";

let html =
`<h4>${index+1}. ${quiz.question}</h4>`;

quiz.options.forEach((opt,i)=>{

html += `
<label>
<input type="radio"
name="q${index}"
value="${i}">
${opt}
</label><br>
`;

});

div.innerHTML = html;

container.appendChild(div);

});

let submitBtn =
document.createElement("button");

submitBtn.innerHTML =
"Submit Quiz";

submitBtn.onclick =
calculateResult;

container.appendChild(submitBtn);
}

function calculateResult(){

let score = 0;

let resultHTML = "";

quizzes.forEach((quiz,index)=>{

let selected =
document.querySelector(
`input[name="q${index}"]:checked`
);

let answer =
selected ?
parseInt(selected.value)
: -1;

if(answer === quiz.correct){
score++;
resultHTML +=
`<p class="correct">
Q${index+1} Correct
</p>`;
}else{
resultHTML +=
`<p class="wrong">
Q${index+1} Wrong
</p>
<p>Correct Answer:
${quiz.options[quiz.correct]}
</p>`;
}
});

document.getElementById("result").innerHTML =
`
<h3>Score: ${score}/${quizzes.length}</h3>
${resultHTML}
`;
}

loadQuizzes();
</script>

</body>
</html>
